<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NullX</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body, html {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: linear-gradient(270deg, #00d2ff, #0033cc, #00b3ff, #0066ff);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 40px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px cyan; }
      to { text-shadow: 0 0 30px #00aaff, 0 0 20px cyan; }
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .btn {
      background-color: rgba(255, 255, 255, 0.1);
      border: 2px solid #ffffff44;
      padding: 15px 30px;
      font-size: 1.2rem;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .btn:hover {
      background-color: rgba(255, 255, 255, 0.25);
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      border-color: cyan;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 3rem;
      }

      .btn {
        font-size: 1rem;
        padding: 12px 24px;
      }
    }

    /* Optional: Floating particles effect */
    .particle {
      position: fixed;
      top: -10px;
      background: rgba(0, 255, 255, 0.5);
      border-radius: 50%;
      pointer-events: none;
      animation: fall linear infinite;
      z-index: -1;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <h1>NullX</h1>
  <div class="button-container">
    <a href="#" class="btn">Download</a>
    <a href="#" class="btn">YouTube</a>
    <a href="#" class="btn">Discord</a>
    <a href="#" class="btn">Support</a>
  </div>

  <script>
    // Optional: Add floating cyan particles
    function createParticle() {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      const size = Math.random() * 5 + 2;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = Math.random() * 5 + 3 + 's';
      particle.style.animationDelay = Math.random() * 5 + 's';
      document.body.appendChild(particle);
      
      setTimeout(() => {
        particle.remove();
      }, 8000);
    }
    
    // Create particles every 300ms
    setInterval(createParticle, 300);
  </script>
</body>
</html>
