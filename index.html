<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NullX</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body, html {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: url('https://cdn.discordapp.com/attachments/1363818689463320647/1367124587846041720/IMG_1328.gif?ex=6813717d&is=68121ffd&hm=b4933a9447b253164848dd13ad6b4de9a86e40f98075d245162509d10d9280ad&') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 40px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .btn {
      background-color: rgba(255, 255, 255, 0.1);
      border: 2px solid #ffffff44;
      padding: 15px 30px;
      font-size: 1.2rem;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .btn:hover {
      background-color: rgba(255, 255, 255, 0.25);
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 3rem;
      }

      .btn {
        font-size: 1rem;
        padding: 12px 24px;
      }
    }
  </style>
</head>
<body>
  <h1>NullX</h1>
  <div class="button-container">
    <a href="#" class="btn">Download</a>
    <a href="#" class="btn">YouTube</a>
    <a href="#" class="btn">Discord</a>
    <a href="#" class="btn">Support</a>
  </div>
</body>
</html>
